services:
  api:
    build:
      context: ${API_BUILD_CONTEXT:-./api}
    env_file:
      - ${API_ENV_FILE:-./api/.env}
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      RESEARCH_STORAGE_BACKEND: ${RESEARCH_STORAGE_BACKEND:-json}
      RESEARCH_QUEUE_BACKEND: ${RESEARCH_QUEUE_BACKEND:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api-data:/app/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  web:
    build:
      context: ${WEB_BUILD_CONTEXT:-./web}
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_AUTH_CALLBACK_PATH: ${NEXT_PUBLIC_AUTH_CALLBACK_PATH:-/auth/callback}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
  redis-data:
