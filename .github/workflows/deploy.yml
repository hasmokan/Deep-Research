name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to hasmodream.com/ds
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          DEPLOY_HOST: 103.112.1.107
          DEPLOY_PORT: 22
          DEPLOY_USER: root
          DEPLOY_SSH_KEY: ${{ secrets.GOMAMI_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::$name is not set. Add it in Settings -> Secrets and variables -> Actions."
              exit 1
            fi
          }

          require_secret DEPLOY_HOST "$DEPLOY_HOST"
          require_secret DEPLOY_USER "$DEPLOY_USER"
          require_secret DEPLOY_SSH_KEY "$DEPLOY_SSH_KEY"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host *
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          DEPLOY_HOST: 103.112.1.107
          DEPLOY_USER: root
          DEPLOY_PORT: 22
          DEPLOY_PUBLIC_ORIGIN: https://hasmodream.com
          DEPLOY_BASE_PATH: /ds
          DEPLOY_WEB_PORT: 3002
          DEPLOY_API_PORT: 8000
          DEPLOY_NGINX_SITE: /etc/nginx/sites-enabled/hasmodream
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: scripts/deploy-production.sh
